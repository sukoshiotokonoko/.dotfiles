source = /home/meprimaryuser/.config/hypr/hyprland_colors.conf

general {
	$GAP = 10
	border_size = 3
	gaps_in = $GAP
	gaps_out = $GAP
	col.inactive_border = $inactive_gen
	col.active_border = $active_gen
	snap {
		enabled = true
	}
}

decoration {
	rounding = 26 
	inactive_opacity = 0.85
	shadow {
		sharp = true
	}
}

animations {
	workspace_wraparound = true
}

input {
	kb_model = pc105
	kb_options = grp:win_space_toggle
	kb_rules = evdev
    sensitivity = 0.0
	accel_profile = flat
}

group {
	groupbar {
		font_weight_active = bold
		gradients = true
		#col.active = rgb(1900FF)
		#col.inactive = rgb(00D1FF)
        #Figure Out Grouping Later
	}
}	

binds {
    workspace_back_and_forth = false
    hide_special_on_workspace_change = true
}

ecosystem {
	no_donation_nag = true
}

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

#Run at Launch Statements
exec-once = waybar #Waybar
exec-once = systemctl --user start hyprpolkitagent #Authentication Agent
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = wal -R # Keeps pywal color schemes post-reboot.
exec-once = sudo timedatectl set-ntp true #Syncs The Time
exec-once = protonmail-bridge --no-window #Starts Service to Enable Proton Mail on Thunderbird
exec-once = qbittorrent
exec-once = openbooks server --server irc.irchighway.net:6667 --tls=false --name shioto -d /media/Downloads/

#Launch Apps At Boot
exec-once = kdeconnectd #Daemon Only
exec-once = [workspace special:minimize1 silent] dev.vencord.Vesktop
exec-once = waydroid app launch com.metrolist.music
exec-once = suwayomi
exec-once = wal -R
#exec-once = hyprctl output create headless headlessVNC #Creates Headless Monitor for wayvnc
#monitor = headlessVNC, 1920x1080@60, auto, 1 #Configs Headless Monitor
#exec-once = wayvnc -o headlessVNC #Starts wayvnc using Headless Monitor

#Dark Theme
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark" # for GTK4 apps
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3" # for GTK3 apps
env = QT_QPA_PLATFORMTHEME,qt6ct # for Qt apps

#rclone Mounts
exec = rclone mount protonDrive: ~/rclone\ Mounts/protonDrive
exec = rclone mount googleDrive: ~/rclone\ Mounts/googleDrive

#Set IP Rules
exec = sudo ip route add 100.64.0.0/10 dev tailscale0
exec = sudo ip route add fd7a:115c:a1e0::/48 dev tailscale0

#Animations
animation = workspaces, 1, 10, default, slide right

#Jellyfin

#Keybinds (SUPER is the Win Key)
#SUPER (Win) is meant for default, it's for the important stuff. It is also used in combination with other modkeys.
#SHIFT (Shift) is meant for "shifting" the windows, should mainly be used with SUPER.
#CTRL (Control) is meant for controlling apps, should mainly be used with SUPER.
#ALT (Alt) is meant for altered commands, should mainly be used with SUPER.

#App Opening
bind = SUPER, Q, exec, kitty
bind = SUPER CTRL, B, exec, librewolf
bind = ALT, Space, exec, rofi -show drun
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = ALT, B, exec, bzmenu --launcher rofi
bind = ALT, N, exec, iwmenu --launcher rofi
bind = ALT, V, exec, pwmenu --launcher rofi

#System Modifications
bind = SUPER, End, exec, poweroff
bind = SUPER ALT, End, exec, reboot
bind = SUPER CTRL, End, exec, hyprctl dispatch exit
bind = SUPER, f, fullscreen, 0
bind = SUPER ALT, f, fullscreen, 1
bind = CTRL, q, killactive #Doesn't use SUPER because this is the default command for CTRL + Q on 99% of apps.
bind = SUPER ALT, d, exec, /home/meprimaryuser/Documents/toggle_show_desktop.sh

#Changing The Active Window
bind = SUPER, h, movefocus, l
bind = SUPER, j, movefocus, d
bind = SUPER, k, movefocus, u
bind = SUPER, l, movefocus, r

#Moving The Active Window
bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, j, movewindow, d
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, l, movewindow, r

#Changing Active Window Size
bind = SUPER ALT, h, resizeactive, -5% 0
bind = SUPER ALT, j, resizeactive, 0 5%
bind = SUPER ALT, k, resizeactive, 0 -5%
bind = SUPER ALT, l, resizeactive, 5% 0

#Swaps Active Window's Floating State
bind = SUPER CTRl, f, togglefloating

#Minimize Workspaces
bind = SUPER CTRL, m, movetoworkspacesilent, special:minimize1
bind = SUPER, m, togglespecialworkspace, minimize1
bind = SUPER CTRL, comma, movetoworkspacesilent, special:minimize2
bind = SUPER, comma, togglespecialworkspace, minimize2
bind = SUPER CTRL, period, movetoworkspacesilent, special:minimize3
bind = SUPER, period, togglespecialworkspace, minimize3

#Changing Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

#Switching App Workspace
bind = SUPER CTRL, 1, movetoworkspacesilent, 1
bind = SUPER CTRL, 2, movetoworkspacesilent, 2
bind = SUPER CTRL, 3, movetoworkspacesilent, 3
bind = SUPER CTRL, 4, movetoworkspacesilent, 4
bind = SUPER CTRL, 5, movetoworkspacesilent, 5
bind = SUPER CTRL, 6, movetoworkspacesilent, 6
bind = SUPER CTRL, 7, movetoworkspacesilent, 7
bind = SUPER CTRL, 8, movetoworkspacesilent, 8
bind = SUPER CTRL, 9, movetoworkspacesilent, 9
bind = SUPER CTRL, 0, movetoworkspacesilent, 10

#Temporary
bind = SUPER, r, exec, bash ~/Documents/reloadwaybar.sh #Reloads Waybar
bind = SUPER CTRL, r, exec, hyprctl reload
